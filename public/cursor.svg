<svg width="33" height="33" viewBox="0 0 33 33" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient Stroke -->
    <linearGradient id="strokeGradient" x1="0" y1="0" x2="33" y2="33" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7DD3FC"/>  <!-- soft blue -->
      <stop offset="100%" stop-color="#A78BFA"/> <!-- soft violet -->
    </linearGradient>

    <!-- Glow Effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <path 
    d="M5.08722 1.29492C2.72504 0.488316 0.450484 2.71335 1.20492 5.09272L8.6164 28.4674C9.45147 31.1011 13.0819 31.3471 14.2647 28.8502L18.8259 19.2209C18.9005 19.0634 19.0306 18.9389 19.1912 18.8713L28.5628 14.9253C31.1392 13.8405 31.0109 10.1469 28.3654 9.24356L5.08722 1.29492Z"
    
    fill="rgba(255,255,255,0.04)" 
    stroke="url(#strokeGradient)" 
    stroke-width="2"
    stroke-linejoin="round"
    filter="url(#glow)"
  />
</svg>